<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>视频剪辑 | 智绘全屋</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-page="video">
    <div class="ambient-bg" aria-hidden="true"></div>
    <header class="app-header">
      <a class="logo-link" href="index.html"><img src="image.png" alt="智绘全屋"></a>
      <nav class="top-nav"><a href="index.html">首页</a><a href="floorplan.html">户型生图</a><a href="text-image.html">文本生图</a><a class="active" href="video.html">视频剪辑</a><a href="assets.html">资产库</a><a href="pricing.html">会员</a></nav>
      <div class="header-actions"><a class="points-chip" href="pricing.html">✦ <span data-points>1000</span></a><a class="white-button small" href="pricing.html">开会员</a><div class="profile-menu"><button class="avatar-button" type="button">智</button><div class="profile-popover"><strong>智绘全屋账户</strong><p>会员积分 <b data-points>1000</b></p><p>奖励积分 <b data-reward-points>88</b></p><a href="pricing.html">查看用量</a><a href="pricing.html">管理账户</a></div></div></div>
    </header>
    <main class="studio-page">
      <div class="page-heading studio-title">
        <p class="eyebrow">Image to video</p>
        <h1>图片生成展示视频</h1>
        <p>上传效果图，自动拼接镜头、字幕和音乐，生成适合门店展示的短视频。</p>
      </div>
      <section class="studio-layout">
        <form class="creator-box parameter-panel" id="videoForm">
          <label class="upload-drop"><input id="videoUpload" type="file" accept="image/*" multiple><strong>上传图片素材</strong><small>支持多张图片，自动生成视频时间线</small></label>
          <div class="preview-grid" id="videoPreview"></div>
          <div class="form-grid">
            <label>单图时长<input id="secondsPerImage" type="number" min="2" max="10" value="4"></label>
            <label>转场方式<select id="transitionType"><option>淡入淡出</option><option>横向推移</option><option>轻微推进</option></select></label>
            <label>视频画幅<select id="videoRatio"><option>16:9</option><option>9:16</option><option>1:1</option></select></label>
            <label>背景音乐<input id="musicUpload" type="file" accept="audio/*"></label>
          </div>
          <label>视频字幕<textarea id="subtitleText" rows="4" placeholder="例：全屋定制方案 · 空间更整洁，生活更从容"></textarea></label>
          <button class="white-button wide generate-button" type="submit">生成视频</button>
        </form>
        <section class="result-box preview-panel video-stage">
          <div class="result-head"><div><h2>视频预览</h2><p>镜头、字幕和音乐会在这里合成为短视频。</p></div></div>
          <div class="empty-preview video-empty"><span></span><strong>等待图片素材</strong><p>上传效果图后，AI 会自动生成展示时间线。</p></div>
          <div class="steps timeline-steps"><span class="active">上传图片</span><span>镜头拼接</span><span>字幕音乐</span><span>生成视频</span></div>
          <div class="result-gallery" id="videoResults"></div>
          <div class="status-line" id="videoLog">上传图片后开始剪辑。</div>
        </section>
      </section>
    </main>
    <div class="toast" id="toast"></div>
    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
